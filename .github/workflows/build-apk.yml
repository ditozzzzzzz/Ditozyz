name: Build APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL website yang mau di-wrap jadi APK'
        required: true
      app_name:
        description: 'Nama aplikasi'
        required: true
      theme_color:
        description: 'Warna tema (hex, contoh #1976D2)'
        required: false
        default: '#1976D2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: android-template
        run: |
          gradle assembleDebug \
            -PtargetUrl="${{ github.event.inputs.url }}" \
            -PappName="${{ github.event.inputs.app_name }}" \
            -PthemeColor="${{ github.event.inputs.theme_color }}"

      - name: Rename APK
        run: |
          mkdir -p output
          cp android-template/app/build/outputs/apk/debug/app-debug.apk output/app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: output/*.apk
          retention-days: 1
